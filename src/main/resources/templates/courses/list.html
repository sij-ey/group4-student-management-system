<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head><title>Courses</title></head>
<body>
<main layout:fragment="content">

    <div class="page-header d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="page-title"><i class="bi bi-book me-2"></i>Courses</h2>
            <p class="text-muted mb-0">Manage all available courses</p>
        </div>
        <a th:href="@{/courses/new}" class="btn btn-primary">
            <i class="bi bi-plus-circle me-1"></i>Add Course
        </a>
    </div>

    <!-- Empty state -->
    <div th:if="${#lists.isEmpty(courses)}" class="empty-state">
        <i class="bi bi-book display-1 text-muted"></i>
        <h5 class="mt-3">No courses found</h5>
        <p class="text-muted">Add your first course to get started.</p>
        <a th:href="@{/courses/new}" class="btn btn-primary mt-2">
            <i class="bi bi-plus-circle me-1"></i>Add Course
        </a>
    </div>

    <!-- Courses table -->
    <div th:if="${!#lists.isEmpty(courses)}" class="card shadow-sm">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-header">
                        <tr>
                            <th>#</th>
                            <th>Course Name</th>
                            <th>Code</th>
                            <th>Lecturer</th>
                            <th>Credits</th>
                            <th class="text-center">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="course, stat : ${courses}">
                            <td class="text-muted small" th:text="${stat.count}">1</td>
                            <td class="fw-semibold" th:text="${course.courseName}">Course Name</td>
                            <td><span class="badge badge-course" th:text="${course.courseCode}">CODE</span></td>
                            <td class="text-muted" th:text="${course.lecturer}">Lecturer</td>
                            <td>
                                <span class="badge bg-light text-dark border" th:text="${course.credits} + ' Credits'">3</span>
                            </td>
                            <td class="text-center">
                                <div class="btn-group btn-group-sm">
                                    <a th:href="@{/courses/edit/{id}(id=${course.id})}"
                                       class="btn btn-outline-warning" title="Edit">
                                        <i class="bi bi-pencil"></i>
                                    </a>
                                    <a th:href="@{/courses/delete/{id}(id=${course.id})}"
                                       class="btn btn-outline-danger"
                                       title="Delete"
                                       onclick="return confirm('Delete this course? All registrations for it will also be removed.')">
                                        <i class="bi bi-trash"></i>
                                    </a>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
        <div class="card-footer text-muted small">
            Total: <strong th:text="${#lists.size(courses)}">0</strong> course(s)
        </div>
    </div>

</main>
</body>
</html>
