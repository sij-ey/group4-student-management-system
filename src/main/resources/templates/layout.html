<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <meta name="theme-color" content="#2563eb">
    <!-- <link rel="manifest" href="/manifest.json"> -->
    <title layout:title-pattern="$CONTENT_TITLE - UniReg">UniReg</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <!-- Bootstrap 5 -->
    <link th:href="@{https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css}" rel="stylesheet"/>
    <!-- Bootstrap Icons -->
    <link th:href="@{https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css}" rel="stylesheet"/>
    <!-- Google Fonts -->
    <link th:href="@{https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap}" rel="stylesheet"/>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark sticky-top" id="mainNav">
    <div class="container-fluid px-4">
        <a class="navbar-brand fw-bold" th:href="@{/dashboard}">
            <i class="bi bi-mortarboard-fill me-2"></i>UniReg
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto gap-1">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/dashboard}" th:classappend="${currentUri != null and currentUri == '/dashboard'} ? 'active'">
                        <i class="bi bi-speedometer2 me-1"></i>Dashboard
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:classappend="${currentUri != null and currentUri == '/students'} ? 'active' : ''">
                        <i class="bi bi-people me-1"></i>Students
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/courses}" th:classappend="${currentUri != null and currentUri == '/courses'} ? 'active' : ''">
                        <i class="bi bi-book me-1"></i>Courses
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/registrations}" th:classappend="${currentUri != null and currentUri == '/registrations'} ? 'active' : ''">
                        <i class="bi bi-card-checklist me-1"></i>Registrations
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- FLASH MESSAGES -->
<div class="container-fluid px-4 mt-3">
    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show shadow-sm" role="alert">
        <i class="bi bi-check-circle-fill me-2"></i>
        <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show shadow-sm" role="alert">
        <i class="bi bi-exclamation-triangle-fill me-2"></i>
        <span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
</div>

<!-- PAGE CONTENT -->
<main class="container-fluid px-4 py-3">
    <div layout:fragment="content"></div>
</main>

<footer class="footer mt-auto py-3 text-center">
    <span class="text-muted small">
        &copy; 2024 UniReg &mdash; Built with Spring Boot &amp; Thymeleaf
    </span>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
