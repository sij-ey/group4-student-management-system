<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head><title>Error</title></head>
<body>
<main layout:fragment="content">
    <div class="row justify-content-center mt-5">
        <div class="col-12 col-md-6 text-center">
            <i class="bi bi-exclamation-triangle-fill display-1 text-danger mb-3"></i>
            <h2 class="fw-bold" th:text="${errorTitle}">Error</h2>
            <p class="text-muted" th:text="${errorMessage}">Something went wrong.</p>
            <a th:href="@{/dashboard}" class="btn btn-primary mt-3">
                <i class="bi bi-house me-1"></i>Back to Dashboard
            </a>
        </div>
    </div>
</main>
</body>
</html>
