<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head><title>All Registrations</title></head>
<body>
<main layout:fragment="content">

    <div class="page-header d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="page-title"><i class="bi bi-card-checklist me-2"></i>All Registrations</h2>
            <p class="text-muted mb-0">Overview of all course registrations across students</p>
        </div>
        <a th:href="@{/students}" class="btn btn-outline-primary">
            <i class="bi bi-person-plus me-1"></i>Register a Student
        </a>
    </div>

    <!-- Empty state -->
    <div th:if="${#lists.isEmpty(registrations)}" class="empty-state">
        <i class="bi bi-card-checklist display-1 text-muted"></i>
        <h5 class="mt-3">No registrations yet</h5>
        <p class="text-muted">Go to a student's profile to register them for a course.</p>
        <a th:href="@{/students}" class="btn btn-primary mt-2">View Students</a>
    </div>

    <!-- Registrations table -->
    <div th:if="${!#lists.isEmpty(registrations)}" class="card shadow-sm">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-header">
                        <tr>
                            <th>#</th>
                            <th>Student</th>
                            <th>Course</th>
                            <th>Code</th>
                            <th>Semester</th>
                            <th>Credits</th>
                            <th class="text-center">Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="reg, stat : ${registrations}">
                            <td class="text-muted small" th:text="${stat.count}">1</td>
                            <td>
                                <div class="d-flex align-items-center gap-2">
                                    <div class="avatar avatar--sm" th:text="${#strings.substring(reg.student.name,0,1)}">A</div>
                                    <a th:href="@{/students/profile/{id}(id=${reg.student.id})}"
                                       class="fw-semibold text-decoration-none"
                                       th:text="${reg.student.name}">Student</a>
                                </div>
                            </td>
                            <td th:text="${reg.course.courseName}">Course</td>
                            <td><span class="badge badge-course" th:text="${reg.course.courseCode}">CODE</span></td>
                            <td class="text-muted small" th:text="${reg.semester}">Semester</td>
                            <td><span class="badge bg-light text-dark border" th:text="${reg.course.credits} + ' cr'">3 cr</span></td>
                            <td class="text-center">
                                <a th:href="@{/registrations/drop/{regId}(regId=${reg.id}, studentId=${reg.student.id})}"
                                   class="btn btn-outline-danger btn-sm"
                                   onclick="return confirm('Drop this registration?')">
                                    <i class="bi bi-x-circle me-1"></i>Drop
                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
        <div class="card-footer text-muted small">
            Total: <strong th:text="${#lists.size(registrations)}">0</strong> registration(s)
        </div>
    </div>

</main>
</body>
</html>
