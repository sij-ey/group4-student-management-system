<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head><title th:text="${student.name} + ' - Profile'">Student Profile</title></head>
<body>
<main layout:fragment="content">

    <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/students}">Students</a></li>
            <li class="breadcrumb-item active" th:text="${student.name}">Profile</li>
        </ol>
    </nav>

    <div class="row g-4">

        <!-- STUDENT DETAIL CARD -->
        <div class="col-12 col-md-4">
            <div class="card shadow-sm h-100">
                <div class="card-body text-center p-4">
                    <div class="avatar avatar--lg mx-auto mb-3" th:text="${#strings.substring(student.name,0,1)}">A</div>
                    <h4 class="fw-bold mb-1" th:text="${student.name}">Name</h4>
                    <p class="text-muted mb-3" th:text="${student.email}">email</p>

                    <div class="list-group list-group-flush text-start">
                        <div class="list-group-item d-flex justify-content-between px-0">
                            <span class="text-muted"><i class="bi bi-mortarboard me-2"></i>Program</span>
                            <strong th:text="${student.program}">Program</strong>
                        </div>
                        <div class="list-group-item d-flex justify-content-between px-0">
                            <span class="text-muted"><i class="bi bi-calendar3 me-2"></i>Year</span>
                            <strong th:text="'Year ' + ${student.yearOfStudy}">Year 1</strong>
                        </div>
                        <div class="list-group-item d-flex justify-content-between px-0">
                            <span class="text-muted"><i class="bi bi-hash me-2"></i>Student ID</span>
                            <strong th:text="${student.id}">1</strong>
                        </div>
                    </div>

                    <div class="d-grid gap-2 mt-4">
                        <a th:href="@{/students/edit/{id}(id=${student.id})}" class="btn btn-outline-warning btn-sm">
                            <i class="bi bi-pencil me-1"></i>Edit Profile
                        </a>
                        <a th:href="@{/registrations/new/{id}(id=${student.id})}" class="btn btn-primary btn-sm">
                            <i class="bi bi-journal-plus me-1"></i>Register for Course
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <!-- REGISTERED COURSES -->
        <div class="col-12 col-md-8">
            <div class="card shadow-sm">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <h5 class="mb-0"><i class="bi bi-journal-bookmark me-2"></i>Registered Courses</h5>
                    <span class="badge bg-primary" th:text="${#lists.size(registrations)} + ' course(s)'">0</span>
                </div>
                <div class="card-body p-0">

                    <!-- No registrations -->
                    <div th:if="${#lists.isEmpty(registrations)}" class="p-4 text-center text-muted">
                        <i class="bi bi-journal-x display-5"></i>
                        <p class="mt-2">No courses registered yet.</p>
                        <a th:href="@{/registrations/new/{id}(id=${student.id})}" class="btn btn-primary btn-sm">
                            Register Now
                        </a>
                    </div>

                    <!-- Registrations table -->
                    <div th:if="${!#lists.isEmpty(registrations)}" class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="table-header">
                                <tr>
                                    <th>Course</th>
                                    <th>Code</th>
                                    <th>Lecturer</th>
                                    <th>Semester</th>
                                    <th>Credits</th>
                                    <th class="text-center">Action</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="reg : ${registrations}">
                                    <td class="fw-semibold" th:text="${reg.course.courseName}">Course</td>
                                    <td><span class="badge badge-course" th:text="${reg.course.courseCode}">CODE</span></td>
                                    <td class="text-muted" th:text="${reg.course.lecturer}">Lecturer</td>
                                    <td class="text-muted small" th:text="${reg.semester}">Semester</td>
                                    <td><span class="badge bg-light text-dark border" th:text="${reg.course.credits} + ' cr'">3 cr</span></td>
                                    <td class="text-center">
                                        <a th:href="@{/registrations/drop/{regId}(regId=${reg.id}, studentId=${student.id})}"
                                           class="btn btn-outline-danger btn-sm"
                                           onclick="return confirm('Drop this course?')">
                                            <i class="bi bi-x-circle me-1"></i>Drop
                                        </a>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

</main>
</body>
</html>
