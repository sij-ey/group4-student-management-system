# ===========================
# Application Settings
# ===========================
spring.application.name=student-management-system
server.port=9090
spring.web.resources.add-mappings=true

# ===========================
# DATABASE (MySQL)
# Comment this block and use H2 below for quick testing without MySQL
# ===========================
spring.datasource.url=jdbc:mysql://localhost:3306/student_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===========================
# JPA / Hibernate
# ===========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ===========================
# H2 In-Memory DB (uncomment to use H2 instead of MySQL)
# ===========================
# spring.datasource.url=jdbc:h2:mem:studentdb
# spring.datasource.driver-class-name=org.h2.Driver
# spring.datasource.username=sa
# spring.datasource.password=
# spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# spring.h2.console.enabled=true
# spring.h2.console.path=/h2-console

# ===========================
# Thymeleaf
# ===========================
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# ===========================
# Logging
# ===========================
logging.level.com.example.studentapp=DEBUG
